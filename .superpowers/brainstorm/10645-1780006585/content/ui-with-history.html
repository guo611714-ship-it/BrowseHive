<div class="section">
  <h2>最终设计 — 含对话历史</h2>
  <p class="subtitle">左侧聊天区 + 右侧历史记录</p>
</div>

<div class="cards">
  <div class="card" data-choice="design-with-history" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 0; background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden;">
      <div style="display: flex; height: 420px; font-family: -apple-system, 'PingFang SC', sans-serif;">
        <!-- 左侧：聊天区 -->
        <div style="flex: 1; display: flex; flex-direction: column; padding: 20px; border-right: 1px solid #f0f0f0;">
          <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div style="font-size: 28px; margin-bottom: 6px;">👋</div>
            <div style="font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px;">早上好</div>
            <div style="font-size: 12px; color: #888; line-height: 1.5; text-align: center;">
              我是您的 Excel 智能助理<br>请问现在能帮您做什么？
            </div>
          </div>
          <!-- 输入栏 -->
          <div style="border: 1px solid #e0e0e0; border-radius: 14px; padding: 10px 14px; background: #fafafa;">
            <div style="color: #bbb; font-size: 13px; margin-bottom: 10px;">输入聊天内容...</div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 6px;">
                <div style="width: 18px; height: 18px; background: linear-gradient(135deg, #7c3aed, #2563eb); border-radius: 50%;"></div>
                <span style="font-size: 11px; color: #888;">Gemma 3n</span>
              </div>
              <div style="display: flex; align-items: center; gap: 10px; color: #aaa;">
                <span style="font-size: 14px;">📎</span>
                <div style="width: 26px; height: 26px; background: #7c3aed; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px;">➤</div>
              </div>
            </div>
          </div>
        </div>
        <!-- 右侧：对话历史 -->
        <div style="width: 180px; padding: 16px 12px; background: #fafafa; display: flex; flex-direction: column;">
          <div style="font-size: 11px; font-weight: 600; color: #999; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px;">对话历史</div>
          <div style="flex: 1; overflow-y: auto;">
            <div style="padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; background: #f0f0f0; font-size: 12px; color: #333; cursor: pointer;">
              📊 分析销售数据趋势
            </div>
            <div style="padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; font-size: 12px; color: #666; cursor: pointer;">
              📝 优化这段产品描述
            </div>
            <div style="padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; font-size: 12px; color: #666; cursor: pointer;">
              🔢 生成VLOOKUP公式
            </div>
            <div style="padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; font-size: 12px; color: #666; cursor: pointer;">
              🧹 清洗重复数据
            </div>
          </div>
          <div style="padding: 8px; border: 1px dashed #ddd; border-radius: 8px; text-align: center; font-size: 11px; color: #aaa; cursor: pointer;">
            + 新对话
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>完整布局 — 含对话历史</h3>
      <p>左侧：聊天区（问候+输入） | 右侧：历史记录列表 + 新建对话</p>
    </div>
  </div>
</div>
