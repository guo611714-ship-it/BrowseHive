name: Knowledge Base CI

on:
  push:
    paths:
      - 'AI知识库/**'
  pull_request:
    paths:
      - 'AI知识库/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install openai pytest pytest-cov python-dotenv

      - name: Run unit tests
        working-directory: AI知识库
        run: python -m pytest tests/test_kb_manager.py -v --tb=short

      - name: Run e2e tests (if API key available)
        working-directory: AI知识库
        if: env.NVIDIA_API_KEY != ''
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python -m pytest tests/test_e2e.py -v --tb=short
