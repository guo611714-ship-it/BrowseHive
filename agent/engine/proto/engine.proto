syntax = "proto3";

package engine;

// Parallel Fix Engine gRPC 服务定义
// 当前实现为 JSON-RPC over HTTP，此 proto 为未来升级 gRPC 的预备定义

service FixEngineService {
  // 提交任务清单
  rpc Submit (SubmitRequest) returns (SubmitResponse);

  // 查询执行状态
  rpc Status (StatusRequest) returns (StatusResponse);

  // 取消执行
  rpc Cancel (CancelRequest) returns (CancelResponse);

  // 分析任务（不执行）
  rpc Analyze (AnalyzeRequest) returns (AnalyzeResponse);

  // 获取引擎统计
  rpc Stats (StatsRequest) returns (StatsResponse);

  // 健康检查
  rpc Health (HealthRequest) returns (HealthResponse);
}

// --- 消息定义 ---

message TaskDef {
  string task_id = 1;
  string description = 2;
  repeated string files = 3;
  string agent_type = 4;
  string priority = 5;
  string context = 6;
  string expected_output = 7;
  double timeout = 8;
  repeated string depends_on = 9;
  map<string, string> metadata = 10;
}

message ManifestDef {
  repeated TaskDef tasks = 1;
  string strategy = 2;
  string priority = 3;
  string context = 4;
  int32 max_concurrent = 5;
  map<string, string> metadata = 6;
}

message SubmitRequest {
  ManifestDef manifest = 1;
}

message SubmitResponse {
  string manifest_id = 1;
  string status = 2;
  int32 task_count = 3;
}

message StatusRequest {
  string manifest_id = 1;
}

message StatusResponse {
  string manifest_id = 1;
  string status = 2;
  int32 total = 3;
  map<string, int32> by_status = 4;
  repeated TaskEntryDef entries = 5;
}

message TaskEntryDef {
  string entry_id = 1;
  string task_id = 2;
  string status = 3;
  string result = 4;
  string error = 5;
}

message CancelRequest {
  string manifest_id = 1;
}

message CancelResponse {
  string manifest_id = 1;
  int32 cancelled = 2;
}

message AnalyzeRequest {
  ManifestDef manifest = 1;
}

message AnalyzeResponse {
  string manifest_summary = 1;
  repeated ShardDef shards = 2;
  string conflict_analysis = 3;
  ExecutionPlanDef execution_plan = 4;
}

message ShardDef {
  int32 shard_id = 1;
  int32 task_count = 2;
  repeated string files = 3;
  string reason = 4;
  repeated string tasks = 5;
}

message ExecutionPlanDef {
  int32 total_shards = 1;
  int32 max_concurrent = 2;
  string strategy = 3;
}

message StatsRequest {}

message StatsResponse {
  map<string, string> queue_stats = 1;
  int32 subscribers = 2;
  bool running = 3;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string version = 2;
  string uptime = 3;
}
