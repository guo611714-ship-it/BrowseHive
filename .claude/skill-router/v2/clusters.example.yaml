    triggers_natural:
      - "implementa el componente"
      - "crea una página Next"
      - "edita el TSX"
      - "ajusta el hook useEffect"
      - "server component"
      - "refactoriza el componente"
      - "crea el form"
    keywords:
      - "react"
      - "tsx"
      - "jsx"
      - "next.js"
      - "next js"
      - "componente"
      - "component"
      - "hooks"
      - "useEffect"
      - "server component"
      - "client component"
    paths:
      - "src/app/**/*.tsx"
      - "src/app/**/*.ts"
      - "src/components/**"
      - "**/*.tsx"
    skills:
      - react-dev
      - next-best-practices
      - cks-form-optimization
    confidence_threshold: 0.65
    gate: false   # sugerencia, no bloqueo (gate suave)
    gate_reminder: |
      Sugerencia: invoca `react-dev` para typing/hooks y `next-best-practices`
      para RSC/data patterns antes de tocar src/app/**. Si es un form CKS,
      `cks-form-optimization` es OBLIGATORIA.

  commit_push_pr:
    description: "Crear commits, push a remote, abrir/mergear pull requests — operaciones git escritura que tocan historia"
    triggers_natural:
      - "commit"
      - "push a github"
      - "abre el PR"
      - "crea pull request"
      - "merge el PR"
      - "haz commit y push"
      - "vamos a commitear"
    keywords:
