      - "push"
      - "git add"
      - "gh pr"
      - "pull request"
      - "merge"
    commands:
      - "git commit"
      - "git push"
      - "gh pr create"
      - "gh pr merge"
    skills:
      - commit-work
      - verification-before-completion
      - cks-verify-done
    confidence_threshold: 0.85
    gate: true
    gate_confidence: 0.85
    gate_reminder: |
      🔴 Antes de commit/push/PR: invoca `verification-before-completion`
      para evidencia (build/tests pass) y `commit-work` para commit limpio.
      En cks-system, `cks-verify-done` es obligatoria (Playwright + Sentry).

  agent_dispatch_bg:
    description: "Lanzar agentes en background, paralelización via Agent tool, dispatching de subagentes"
    triggers_natural:
      - "lanza agente background"
      - "agentes en paralelo"
      - "background agent"
      - "lanza varios agents"
      - "agentes simultáneos"
      - "dispatch parallel"
    keywords:
      - "agente background"
      - "parallel agents"
      - "background agent"
      - "lanza agente"
      - "dispatch"
    tool_match:
      - tool_name: Agent
        tool_input_contains:
          run_in_background: true
    skills:
      - superpowers:dispatching-parallel-agents
      - superpowers:subagent-driven-development
    confidence_threshold: 0.85
    gate: true
    gate_confidence: 0.85
    gate_reminder: |
      🔴 Antes de lanzar agentes background: invoca
      `dispatching-parallel-agents` para coordinarte bien.
      Si encadenas tareas dependientes en la misma sesión,
      mejor `subagent-driven-development`.

# Ajustes globales del router
settings:
  llm_model: "gemini-2.5-flash"   # Modelo verificado activo (2026-may). Fallback automático a gemini-flash-latest.
  fallback_to_v1: true        # Si LLM falla, usar regex V1
  dedup_turns: 5              # No re-sugerir skill si se invocó hace <N turnos
  min_prompt_words: 3         # No llamar al LLM con prompts triviales
  max_prompt_chars: 2000      # Truncar prompts muy largos antes de mandar a LLM
  cache_ttl_seconds: 3600     # Cache decisiones LLM por 1h (mismo prompt → misma respuesta)
  log_level: "INFO"           # DEBUG | INFO | WARN | ERROR
  cost_alert_threshold_usd: 1.0   # Avisar si gasto mensual estimado supera esto
