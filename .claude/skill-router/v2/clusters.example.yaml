# Skill Router V2 — Example clusters reference (NOT loaded by default)
#
# example: customize for your stack
#
# This file documents 20+ clusters from a real-world setup, useful as a
# reference when designing your own clusters. The router loads
# `clusters.yaml` (minimal universal set). To adopt any cluster from here,
# copy the block into `clusters.yaml` and tune the skills list to whatever
# you have installed.
#
# Includes domain examples: finance, marketing, pitch decks, c-level
# advisory, vendor integrations (Vercel, Supabase, etc.), session rituals,
# debugging protocols, deploy gates, documentation, code review,
# Playwright/E2E testing. Triggers and gate_reminders use mixed
# Spanish/English — customize for your stack and language.
#
# Each cluster groups skills/plugins by domain. The LLM (Gemini Flash)
# semantically matches the user prompt to descriptions/triggers. If
# confidence >= threshold, a reminder is injected with the cluster's skills.
#
# How to add a new cluster:
#   1. Define `description` (1 line, what this cluster does)
#   2. List `triggers_natural` (phrases users would say)
#   3. List `skills` with exact names (matching SKILL.md `name:` field)
#   4. Mark `auto_invoke: true` for aggressive reminders
#   5. Re-run the router (no Claude Code restart required)

