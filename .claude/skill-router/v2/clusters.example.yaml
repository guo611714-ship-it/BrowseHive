  # ───────────────────── Fase 1 quirúrgica (17-may-2026) ─────────────────────
  # Clusters añadidos por trabajo diario CKS/OpenClaw. Cada uno declara los
  # campos canónicos (description + triggers_natural + skills + threshold) y
  # campos extra que consume `process_pretool` (paths, commands, tool_match).

  code_implementation:
