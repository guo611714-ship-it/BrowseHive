<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Skill Router · Mission Control{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'Menlo', 'Monaco', 'monospace'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            nasa: {
              bg: '#05070a',
              panel: '#0b1117',
              border: '#1c2530',
              accent: '#00ff9c',
              warn: '#ffb454',
              danger: '#ff4d6d',
              cyan: '#3ec9f7',
              muted: '#5b6776',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background:
        radial-gradient(1100px 600px at 15% -10%, rgba(0,255,156,0.05), transparent 60%),
        radial-gradient(900px 500px at 95% 110%, rgba(62,201,247,0.05), transparent 60%),
        #05070a;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #d6dee8;
      min-height: 100vh;
    }
    h1, h2, h3, h4, .mono { font-family: 'JetBrains Mono', Menlo, Monaco, monospace; }
    .glow-accent { box-shadow: 0 0 24px rgba(0,255,156,0.15); }
    .glow-cyan { box-shadow: 0 0 24px rgba(62,201,247,0.12); }
    .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 0.25rem; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; }
    .badge-green { background: rgba(0,255,156,0.13); color: #00ff9c; border: 1px solid rgba(0,255,156,0.3); }
    .badge-cyan { background: rgba(62,201,247,0.13); color: #3ec9f7; border: 1px solid rgba(62,201,247,0.3); }
    .badge-warn { background: rgba(255,180,84,0.13); color: #ffb454; border: 1px solid rgba(255,180,84,0.3); }
    .badge-danger { background: rgba(255,77,109,0.13); color: #ff4d6d; border: 1px solid rgba(255,77,109,0.3); }
    .badge-muted { background: rgba(91,103,118,0.13); color: #9aa6b4; border: 1px solid rgba(91,103,118,0.3); }
    table { border-collapse: collapse; }
    th { text-align: left; font-weight: 600; color: #9aa6b4; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td, th { padding: 0.55rem 0.75rem; border-bottom: 1px solid #1c2530; }
    tr:hover td { background: rgba(62,201,247,0.04); }
    a { color: #3ec9f7; }
    a:hover { color: #00ff9c; }
    pre { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; line-height: 1.45; }
    .scanline::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(transparent 0 3px, rgba(0,0,0,0.06) 3px 4px);
      mix-blend-mode: overlay; opacity: 0.4; z-index: 99;
    }
  </style>
</head>
<body class="scanline">
  <header class="border-b border-nasa-border bg-nasa-panel/70 backdrop-blur sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-6">
      <a href="/" class="flex items-center gap-2 no-underline">
        <span class="inline-block w-2 h-2 rounded-full bg-nasa-accent glow-accent"></span>
        <span class="text-nasa-accent mono font-bold">SKILL ROUTER</span>
        <span class="text-xs text-nasa-muted mono">v{{ version }}</span>
      </a>
      <nav class="flex gap-4 text-sm mono">
        <a href="/" class="hover:text-nasa-accent">overview</a>
        <a href="/clusters" class="hover:text-nasa-accent">clusters</a>
        <a href="/skills" class="hover:text-nasa-accent">skills</a>
        <a href="/audit" class="hover:text-nasa-accent">audit</a>
        <a href="/stats" class="hover:text-nasa-accent">stats</a>
      </nav>
      <div class="flex-1"></div>
      <div class="text-xs text-nasa-muted mono">
        {{ host }}:{{ port }} · {{ build_time }}
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-12 border-t border-nasa-border py-4 text-center text-xs text-nasa-muted mono">
    skill-router · v3-niveldios · localhost-only · NO external traffic
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
