; Hermes-Windows 配置文件
; 请根据您的实际安装路径修改以下设置

[Paths]
; LLM Wiki 可执行文件路径（必需）
; 下载: https://github.com/nasui/LLM_wiki/releases
LLMWiki = C:\Users\YourName\AppData\Local\LLMwiki\LLMwiki.exe

; Obsidian 可执行文件路径（必需）
; 下载: https://obsidian.md
Obsidian = C:\Users\YourName\AppData\Local\Obsidian\Obsidian.exe

; LLM Wiki 项目目录（存放文档和wiki文件夹）
WikiProject = D:\KnowledgeBase\MyWiki

; Obsidian Vault 目录 - 应该指向 LLM Wiki 的 wiki 子文件夹
Vault = D:\KnowledgeBase\MyWiki\wiki

[Settings]
; Claude API Key (可选，如果LLM Wiki未内置)
; ClaudeAPI = sk-ant-...

; 默认模型 (如果LLM Wiki支持选择)
; Model = claude-sonnet-4-20250514

; 窗口查找超时(秒)
Timeout = 10

; 导入后等待时间(秒)
ImportWait = 5

[Hotkeys]
; 您可以自定义热键，格式: 功能=热键
; 可用热键: #i (Win+I), ^i (Ctrl+I), !i (Alt+I), +i (Shift+I)
Import = #i
Query = #q
OpenObsidian = #o
ActivateLLM = #w
ImportAndOpen = #g

; =====================================================
; 使用说明:
; 1. 修改上面的Paths部分为您的实际路径
; 2. 保存此文件到 Hermes-Windows.ahk 同目录
; 3. 运行 Hermes-Windows.ahk (需要AutoHotkey)
; 4. 系统托盘会出现图标，右键可配置
; 5. 使用热键或托盘菜单操作
; =====================================================